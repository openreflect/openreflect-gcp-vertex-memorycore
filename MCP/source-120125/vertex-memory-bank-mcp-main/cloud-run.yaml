apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: vertex-memory-bank-mcp
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/timeout: "300s"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: vertex-memory-bank-mcp-sa@directed-asset-479716-f6.iam.gserviceaccount.com
      containers:
      - image: gcr.io/directed-asset-479716-f6/vertex-memory-bank-mcp:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: GOOGLE_CLOUD_PROJECT
          value: "directed-asset-479716-f6"
        - name: GOOGLE_CLOUD_LOCATION
          value: "us-central1"
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "1"
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          timeoutSeconds: 1
          periodSeconds: 3600
          failureThreshold: 1

