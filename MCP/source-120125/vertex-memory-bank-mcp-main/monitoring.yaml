# Cloud Monitoring configuration for Vertex AI Memory Bank MCP Server

# Alert Policy: High Error Rate
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: vertex-memory-bank-mcp-high-error-rate
  displayName: High Error Rate - Memory Bank MCP
spec:
  displayName: High Error Rate - Memory Bank MCP
  conditions:
    - displayName: Error rate exceeds 5%
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          resource.labels.service_name="vertex-memory-bank-mcp"
          metric.type="run.googleapis.com/request_count"
          metric.labels.response_code_class="5xx"
        comparison: COMPARISON_GT
        thresholdValue: 0.05
        duration: 300s
        aggregations:
          - alignmentPeriod: 60s
            perSeriesAligner: ALIGN_RATE
            crossSeriesReducer: REDUCE_SUM
  notificationChannels:
    - projects/directed-asset-479716-f6/notificationChannels/CHANNEL_ID
  combiner: OR
  enabled: true

---
# Alert Policy: High Latency
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: vertex-memory-bank-mcp-high-latency
  displayName: High Latency - Memory Bank MCP
spec:
  displayName: High Latency - Memory Bank MCP
  conditions:
    - displayName: P95 latency exceeds 5 seconds
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          resource.labels.service_name="vertex-memory-bank-mcp"
          metric.type="run.googleapis.com/request_latencies"
        comparison: COMPARISON_GT
        thresholdValue: 5000
        duration: 300s
        aggregations:
          - alignmentPeriod: 60s
            perSeriesAligner: ALIGN_DELTA
            crossSeriesReducer: REDUCE_PERCENTILE_95
  notificationChannels:
    - projects/directed-asset-479716-f6/notificationChannels/CHANNEL_ID
  combiner: OR
  enabled: true

---
# Alert Policy: Service Unavailable
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: vertex-memory-bank-mcp-service-unavailable
  displayName: Service Unavailable - Memory Bank MCP
spec:
  displayName: Service Unavailable - Memory Bank MCP
  conditions:
    - displayName: Health check failing
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          resource.labels.service_name="vertex-memory-bank-mcp"
          metric.type="run.googleapis.com/container/health_check_status"
        comparison: COMPARISON_LT
        thresholdValue: 1
        duration: 60s
        aggregations:
          - alignmentPeriod: 60s
            perSeriesAligner: ALIGN_MEAN
            crossSeriesReducer: REDUCE_SUM
  notificationChannels:
    - projects/directed-asset-479716-f6/notificationChannels/CHANNEL_ID
  combiner: OR
  enabled: true

---
# Dashboard Configuration (JSON format for Cloud Console)
# Use this in Cloud Console > Monitoring > Dashboards
dashboard:
  displayName: "Vertex Memory Bank MCP Dashboard"
  mosaicLayout:
    tiles:
      - width: 6
        height: 4
        widget:
          title: "Request Rate"
          xyChart:
            dataSets:
              - timeSeriesQuery:
                  timeSeriesFilter:
                    filter: |
                      resource.type="cloud_run_revision"
                      resource.labels.service_name="vertex-memory-bank-mcp"
                      metric.type="run.googleapis.com/request_count"
      - width: 6
        height: 4
        widget:
          title: "Request Latency (P95)"
          xyChart:
            dataSets:
              - timeSeriesQuery:
                  timeSeriesFilter:
                    filter: |
                      resource.type="cloud_run_revision"
                      resource.labels.service_name="vertex-memory-bank-mcp"
                      metric.type="run.googleapis.com/request_latencies"
      - width: 6
        height: 4
        widget:
          title: "Error Rate"
          xyChart:
            dataSets:
              - timeSeriesQuery:
                  timeSeriesFilter:
                    filter: |
                      resource.type="cloud_run_revision"
                      resource.labels.service_name="vertex-memory-bank-mcp"
                      metric.type="run.googleapis.com/request_count"
                      metric.labels.response_code_class="5xx"
      - width: 6
        height: 4
        widget:
          title: "Container Instances"
          xyChart:
            dataSets:
              - timeSeriesQuery:
                  timeSeriesFilter:
                    filter: |
                      resource.type="cloud_run_revision"
                      resource.labels.service_name="vertex-memory-bank-mcp"
                      metric.type="run.googleapis.com/container/instance_count"

